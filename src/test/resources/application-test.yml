spring:
  flyway:
    enabled: true

medicalmcp:
  embedding:
    multi-endpoint:
      api-batch-size: 10
      endpoints:
        - url: http://localhost:11434
          model: nomic-embed-text:v1.5
          priority: 0
  dataset:
    loader:
      enabled: false
      batch-size: 50
      sources:
        - classpath:dataset/train-sample-10.csv
