medicalmcp:
  prompt-lab:
    enabled: true
    eval-split: validation
    min-accuracy: 0.55
    default-limit: 10
    max-failure-examples: 5
    chat:
      enabled: false
      base-url: http://localhost:11434
      model: llama3.2
  dataset:
    loader:
      enabled: false
      sources:
        - classpath:dataset/validation-sample-10.csv
