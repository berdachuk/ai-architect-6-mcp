logging:
  level:
    root: INFO
    com.example.medicalmcp: DEBUG
    com.example.medicalmcp.embedding: DEBUG
    com.example.medicalmcp.embedding.multiendpoint.EmbeddingEndpointPool: TRACE
    com.example.medicalmcp.dataset: DEBUG
    com.example.medicalmcp.retrieval: DEBUG
    com.example.medicalmcp.medicalcase: DEBUG
    com.example.medicalmcp.mcp: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE
    org.springframework.ai: INFO
    org.springframework.modulith: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %m%n"

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    defaults:
      enabled: true

medicalmcp:
  retrieval:
    similarity-threshold: ${MEDICALMCP_RETRIEVAL_SIMILARITY_THRESHOLD:0.70}
