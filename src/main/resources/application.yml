spring:
  application:
    name: medical-mcp-server
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
  ai:
    openai:
      enabled: false
    custom:
      embedding:
        api-key: ${EMBEDDING_API_KEY:none}
        dimensions: ${EMBEDDING_DIMENSIONS:768}
    mcp:
      server:
        name: medical-mcp-server
        version: 1.6.0
        type: SYNC
        protocol: SSE
        instructions: >
          ## Workflow

          ### Step 1 — Explore the dataset
          Ask about available stats or specialties using get_dataset_stats or list_specialties.

          ### Step 2 — Search for cases
          Use search_cases (keyword/FTS) or semantic_search (vector similarity) to find relevant cases.
          Both return case UUIDs needed for the next steps.

          ### Step 3 — Retrieve full details
          Use get_case with a UUID from Step 2 to get the full transcription.

          ### Step 4 — Analyze with prompt
          Use case-analysis prompt with a UUID and optionally focus parameter.

          ### Important
          - get_case requires a valid UUID (id parameter). Obtain it from search_cases or semantic_search first.
          - case-analysis prompt also requires a valid UUID (caseId). The focus parameter controls which fields are emphasized.
          - Focus options: description | transcription | keywords | specialty | all (default: all)
          - When focus=specialty, the prompt includes a PREDICTED_LABEL classification block.
        sse-endpoint: /sse
        sse-message-endpoint: /mcp/message
        keep-alive-interval: 30s
        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: false
        annotation-scanner:
          enabled: true
  datasource:
    url: jdbc:postgresql://${MEDICALMCP_DB_HOST:localhost}:5436/${MEDICALMCP_DB_NAME:medical_mcp}
    username: ${MEDICALMCP_DB_USERNAME:medical_mcp}
    password: ${MEDICALMCP_DB_PASSWORD:medical_mcp}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET hnsw.ef_search = 40
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8092}
  shutdown: graceful

logging:
  file:
    name: logs/medical-mcp-server.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

medicalmcp:
  retrieval:
    max-limit: ${MEDICALMCP_RETRIEVAL_MAX_LIMIT:50}
    default-top-k: ${MEDICALMCP_RETRIEVAL_DEFAULT_TOP_K:5}
    similarity-threshold: ${MEDICALMCP_RETRIEVAL_SIMILARITY_THRESHOLD:0.70}
    stats-cache-ttl-seconds: ${MEDICALMCP_CACHE_STATS_TTL:60}
  embedding:
    multi-endpoint:
      skip-duration-min: ${MEDICALMCP_EMBEDDING_MULTI_ENDPOINT_SKIP_MIN:10}
      worker-per-endpoint: ${MEDICALMCP_EMBEDDING_MULTI_ENDPOINT_WORKERS:1}
      api-batch-size: ${MEDICALMCP_EMBEDDING_MULTI_ENDPOINT_API_BATCH_SIZE:50}
      endpoints:
        - url: ${EMBEDDING_BASE_URL:http://localhost:11434}
          model: ${EMBEDDING_MODEL:nomic-embed-text:v1.5}
          priority: 0
  dataset:
    loader:
      enabled: ${MEDICALMCP_DATASET_LOADER_ENABLED:false}
      batch-size: ${MEDICALMCP_DATASET_LOADER_BATCH_SIZE:50}
      sources:
        - https://huggingface.co/datasets/hpe-ai/medical-cases-classification-tutorial/resolve/main/medical_cases_train.csv
        - https://huggingface.co/datasets/hpe-ai/medical-cases-classification-tutorial/resolve/main/medical_cases_validation.csv
        - https://huggingface.co/datasets/hpe-ai/medical-cases-classification-tutorial/resolve/main/medical_cases_test.csv
