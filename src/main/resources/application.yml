spring:
  application:
    name: medical-mcp-server
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
  ai:
    openai:
      enabled: false
    custom:
      embedding:
        api-key: ${EMBEDDING_API_KEY:none}
        dimensions: ${EMBEDDING_DIMENSIONS:768}
  datasource:
    url: jdbc:postgresql://${MEDICALMCP_DB_HOST:localhost}:5432/${MEDICALMCP_DB_NAME:medical_mcp}
    username: ${MEDICALMCP_DB_USERNAME:medical_mcp}
    password: ${MEDICALMCP_DB_PASSWORD:medical_mcp}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET hnsw.ef_search = 40
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8092}

medicalmcp:
  retrieval:
    max-limit: ${MEDICALMCP_RETRIEVAL_MAX_LIMIT:50}
  embedding:
    multi-endpoint:
      skip-duration-min: ${MEDICALMCP_EMBEDDING_SKIP_DURATION_MIN:10}
      worker-per-endpoint: ${MEDICALMCP_EMBEDDING_WORKERS:1}
      api-batch-size: ${MEDICALMCP_EMBEDDING_API_BATCH_SIZE:50}
      endpoints:
        - url: ${EMBEDDING_BASE_URL:http://localhost:11434}
          model: ${EMBEDDING_MODEL:nomic-embed-text:v1.5}
          priority: 0
  dataset:
    loader:
      enabled: ${MEDICALMCP_DATASET_LOADER_ENABLED:false}
      batch-size: ${MEDICALMCP_DATASET_LOADER_BATCH_SIZE:50}
      sources:
        - https://huggingface.co/datasets/hpe-ai/medical-cases-classification-tutorial/resolve/main/medical_cases_train.csv
        - https://huggingface.co/datasets/hpe-ai/medical-cases-classification-tutorial/resolve/main/medical_cases_validation.csv
        - https://huggingface.co/datasets/hpe-ai/medical-cases-classification-tutorial/resolve/main/medical_cases_test.csv
