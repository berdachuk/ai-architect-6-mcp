services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: medical-mcp-postgres-dev
    environment:
      POSTGRES_DB: medical_mcp
      POSTGRES_USER: medical_mcp
      POSTGRES_PASSWORD: medical_mcp
    ports:
      - "5436:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_mcp -d medical_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:
