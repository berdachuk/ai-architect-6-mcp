name: Quality gate

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B verify -Pquality
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-report
          path: target/test-output/quality-report.json
